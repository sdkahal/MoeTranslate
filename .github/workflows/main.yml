name: Build & Release APK

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: # 允许手动触发，方便测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 1. 执行 Release 编译
      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace

      # 2. 修复 Tag 获取逻辑：
      # 使用 github.ref_name，它在 push tag 时是 v1.0，在手动触发时是 branch 名
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # 仅在推送标签时创建 Release
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          # 3. 修复路径：既然跑的是 assembleRelease，路径必须指向 release
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. 补充：如果是手动触发（没有 Tag），将 APK 作为 Artifact 上传
      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: MoeTranslate-Release-Unsigned
          path: app/build/outputs/apk/release/*.apk
